<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManufSim v3.4</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;--border:#30363d;--border2:#484f58;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;--acc:#f0a500;--acc2:#d4891a;--green:#3fb950;--red:#f85149;--blue:#58a6ff;--purple:#bc8cff;--orange:#ffa657;--r:6px;--r2:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;color:var(--acc)}
.logo-icon{width:26px;height:26px;background:var(--acc);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:700;font-size:11px}
.topbar-r{display:flex;align-items:center;gap:10px}
.sim-badge{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2);padding:3px 10px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border)}
.lang-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:var(--r);font-size:12px;cursor:pointer}
/* LAYOUT */
.layout{display:flex;height:calc(100vh - 52px)}
.sidebar{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--border);padding:14px 0;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:20px}
/* NAV */
.nav-sec{padding:0 10px;margin-bottom:6px}
.nav-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin-bottom:5px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:13px;transition:all .12s;margin-bottom:1px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(240,165,0,.12);color:var(--acc);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-div{height:1px;background:var(--border);margin:10px 10px}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px}
/* BTNS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-family:'IBM Plex Sans',sans-serif;font-weight:500;transition:all .12s}
.btn-p{background:var(--acc);color:#000}.btn-p:hover{background:var(--acc2)}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-s:hover{background:var(--bg4)}
.btn-d{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}.btn-d:hover{background:rgba(248,81,73,.25)}
.btn-g{background:transparent;color:var(--text2);padding:4px 7px}.btn-g:hover{color:var(--text);background:var(--bg3)}
.btn-sm{padding:3px 9px;font-size:12px}
.btn svg{width:13px;height:13px}
/* FORMS */
.fg{margin-bottom:12px}
.fl{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.fi,.fsel{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:var(--r);font-size:13px;font-family:'IBM Plex Sans',sans-serif}
.fi:focus,.fsel:focus{outline:none;border-color:var(--acc)}
.fsel option{background:var(--bg3)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
/* TAGS */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.tg{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.tr{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.tb{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.3)}
.to{background:rgba(255,166,87,.15);color:var(--orange);border:1px solid rgba(255,166,87,.3)}
.ty{background:rgba(240,165,0,.15);color:var(--acc);border:1px solid rgba(240,165,0,.3)}
/* TABLE */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.tw{overflow-x:auto}
/* METRICS */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
.ml{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.mv{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600}
.mv.good{color:var(--green)}.mv.warn{color:var(--orange)}.mv.bad{color:var(--red)}
.ms{font-size:11px;color:var(--text3);margin-top:3px}
.pb{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:3px}
.pf.good{background:var(--green)}.pf.warn{background:var(--orange)}.pf.bad{background:var(--red)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.mbdy{padding:22px}
.mftr{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--bg2);position:sticky;bottom:0}
/* ALERTS */
.al{padding:10px 14px;border-radius:var(--r);margin-bottom:10px;font-size:13px}
.al-i{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);color:var(--blue)}
.al-w{background:rgba(255,166,87,.1);border:1px solid rgba(255,166,87,.3);color:var(--orange)}
.al-g{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green)}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty svg{width:36px;height:36px;margin-bottom:12px;opacity:.35}
/* PAGE */
.page{display:none}.page.active{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-size:19px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:9px}
.sec-sub{color:var(--text2);font-size:13px;margin-bottom:20px}
.toolbar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.mach-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.mono{font-family:'IBM Plex Mono',monospace}
.muted{color:var(--text2)}
.xs{font-size:11px}
.fc{display:flex;align-items:center}
.hidden{display:none!important}
/* SIM LIST */
.sim-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;cursor:pointer;transition:border-color .12s}
.sim-item:hover{border-color:var(--border2)}
.sim-item.cur{border-color:var(--acc)}
/* DEP TAGS */
.dep-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.dep-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
.dep-tag .rx{cursor:pointer;color:var(--text3)}.dep-tag .rx:hover{color:var(--red)}

/* ═══ VISUAL SEQUENCE BUILDER ═══ */
.seq-builder{display:flex;gap:14px;align-items:flex-start}
.seq-palette{width:200px;min-width:200px}
.seq-palette-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.palette-item{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;cursor:grab;font-size:12px;user-select:none;transition:border-color .12s}
.palette-item:hover{border-color:var(--border2)}
.palette-item:active{cursor:grabbing}
.seq-lane{flex:1}
.seq-lane-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.seq-track{display:flex;flex-wrap:wrap;gap:6px;min-height:64px;padding:10px;background:var(--bg);border:2px dashed var(--border2);border-radius:var(--r2);transition:border-color .15s}
.seq-track.dragover{border-color:var(--acc);background:rgba(240,165,0,.05)}
.seq-block{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:grab;user-select:none;border:1px solid transparent;position:relative;transition:opacity .12s}
.seq-block:active{cursor:grabbing;opacity:.7}
.seq-block .sb-dur{font-size:10px;opacity:.7;font-family:'IBM Plex Mono',monospace}
.seq-block .sb-rm{position:absolute;top:-5px;right:-5px;width:16px;height:16px;background:var(--red);color:#fff;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .12s}
.seq-block:hover .sb-rm{opacity:1}
.seq-track-empty{color:var(--text3);font-size:12px;font-style:italic;padding:4px}

/* ═══ GANTT ═══ */
.gantt-wrap{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:16px}
.gantt-scroll{overflow-x:auto;position:relative}
.gantt-inner{position:relative}
.gantt-hdr-row{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.g-lbl{width:175px;min-width:175px;padding:7px 11px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;border-right:1px solid var(--border);flex-shrink:0}
.g-timeline{position:relative;height:28px;flex:1}
.g-tick{position:absolute;top:0;height:100%;border-left:1px solid var(--border);font-size:9px;color:var(--text3);padding:6px 3px;white-space:nowrap;pointer-events:none}
.gantt-row{display:flex;border-bottom:1px solid var(--border)}
.gantt-row:last-child{border-bottom:none}
.g-row-lbl{width:175px;min-width:175px;padding:7px 11px;font-size:12px;color:var(--text2);border-right:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;flex-shrink:0}
.g-track{flex:1;position:relative;height:32px;background:var(--bg)}
.gblk{position:absolute;top:3px;height:26px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;overflow:hidden;white-space:nowrap;padding:0 3px;cursor:pointer;transition:filter .1s}
.gblk:hover{filter:brightness(1.2)}
.gb-run{background:rgba(63,185,80,.28);border:1px solid var(--green);color:var(--green)}
.gb-wait{background:rgba(248,81,73,.22);border:1px solid var(--red);color:var(--red)}
.gb-idle{background:rgba(48,54,61,.6);border:1px solid var(--border2);color:var(--text3)}
.gb-op{background:rgba(88,166,255,.22);border:1px solid var(--blue);color:var(--blue)}
.gb-opwait{background:rgba(188,140,255,.2);border:1px solid var(--purple);color:var(--purple)}
.gb-wipwait{background:rgba(240,165,0,.18);border:1px solid var(--acc);color:var(--acc)}
.drag-handle{cursor:grab;color:var(--text3);padding:0 6px;font-size:14px;user-select:none;flex-shrink:0}
.drag-handle:hover{color:var(--text)}
.sortable-row{transition:opacity .15s}
.sortable-row.dragging{opacity:.4}
.sortable-row.drag-over{border-top:2px solid var(--acc)}
.gantt-reorder{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.order-badge{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text3);width:20px;flex-shrink:0}
/* CURSOR */
.g-cursor{position:absolute;top:0;bottom:0;width:2px;background:var(--acc);z-index:20;pointer-events:none;transition:left .05s}
.act-color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--text1);flex-shrink:0;transition:border-color .15s;box-sizing:border-box}
.act-color-swatch:hover{border-color:var(--text1)!important}
.act-color-selected{border-color:#fff!important;box-shadow:0 0 0 2px var(--acc)}
/* g-cursor time label removed - time shown in playback bar only */
/* GANTT controls */
.gantt-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.gantt-legend{display:flex;gap:14px;padding:8px 12px;flex-wrap:wrap;background:var(--bg3);border-top:1px solid var(--border)}
.gl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.gl-dot{width:11px;height:11px;border-radius:2px}
/* TIME TABLE */
.time-table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-top:14px}
.time-table-hdr{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
/* PLAYBACK */
.playback-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:12px}
.pb-time{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--acc);min-width:70px}
.pb-slider{flex:1;accent-color:var(--acc);cursor:pointer}
/* COLOR PICKER */
.color-picker-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.cp-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s}
.cp-swatch:hover{transform:scale(1.15)}
.cp-swatch.sel{border-color:#fff;transform:scale(1.1)}
/* WAIT ANALYSIS */
.wait-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px}
.wait-row:last-child{border-bottom:none}
.wait-bar-bg{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.wait-bar-fill{height:100%;border-radius:3px;background:var(--red)}
@media(max-width:768px){.sidebar{display:none}.fr2,.fr3{grid-template-columns:1fr}.seq-builder{flex-direction:column}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="logo-icon">MS</div>ManufSim <span style="font-size:10px;color:var(--text3);margin-left:4px">v3.4</span></div>
  <div class="topbar-r">
    <button class="btn btn-g" onclick="hardReload()" title="Vymazať cache a načítať najnovšiu verziu (Ctrl+Shift+R)" style="font-size:11px;padding:3px 8px">⟳ Aktualizovať</button>
    <span class="sim-badge" id="simBadge">—</span>
    <select class="lang-sel" id="langSel" onchange="setLang(this.value)">
      <option value="sk">🇸🇰 SK</option><option value="en">🇬🇧 EN</option>
      <option value="de">🇩🇪 DE</option><option value="es">🇪🇸 ES</option><option value="pt">🇵🇹 PT</option>
    </select>
  </div>
</div>
<div class="layout">
<div class="sidebar">
  <div class="nav-sec">
    <div class="nav-lbl" data-t="lbl_sims"></div>
    <div class="nav-item active" id="nav-sims" onclick="go('sims')"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A1.5 1.5 0 012.5 1h3A1.5 1.5 0 017 2.5v3A1.5 1.5 0 015.5 7H5v2h.5A1.5 1.5 0 017 10.5v3A1.5 1.5 0 015.5 15h-3A1.5 1.5 0 011 13.5v-3A1.5 1.5 0 012.5 9H3V7h-.5A1.5 1.5 0 011 5.5v-3z"/></svg><span data-t="nav_sims"></span></div>
  </div>
  <div class="nav-div"></div>
  <div class="nav-sec">
    <div class="nav-lbl" data-t="lbl_model"></div>
    <div class="nav-item" id="nav-machines" onclick="go('machines')"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.5A.5.5 0 01.5 1h1a.5.5 0 01.5.5V4h13.5a.5.5 0 01.354.854l-3 3a.5.5 0 01-.354.146H2v3h10.5a.5.5 0 010 1H1.5a.5.5 0 01-.5-.5v-11z"/></svg><span data-t="nav_machines"></span></div>
    <div class="nav-item" id="nav-ops" onclick="go('ops')"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 100-6 3 3 0 000 6z"/></svg><span data-t="nav_ops"></span></div>
    <div class="nav-item" id="nav-products" onclick="go('products')"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a2 2 0 012 2v4H6V3a2 2 0 012-2zm3 6V3a3 3 0 10-6 0v4a2 2 0 00-2 2v5a2 2 0 002 2h6a2 2 0 002-2V9a2 2 0 00-2-2z"/></svg><span data-t="products"></span></div>
<div class="nav-item" id="nav-acts" onclick="go('acts')"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M14.5 3a.5.5 0 01.5.5v9a.5.5 0 01-.5.5h-13a.5.5 0 01-.5-.5v-9a.5.5 0 01.5-.5h13z"/></svg><span data-t="nav_acts"></span></div>
    
    <div class="nav-item" id="nav-seqs" onclick="go('seqs')"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M2.5 3a.5.5 0 01.5.5v6.793l1.146-1.147a.5.5 0 01.708.708l-2 2a.5.5 0 01-.708 0l-2-2a.5.5 0 01.708-.708L2 10.293V3.5a.5.5 0 01.5-.5z"/></svg><span data-t="nav_seqs"></span></div>
  </div>
  <div class="nav-div"></div>
  <div class="nav-sec">
    <div class="nav-lbl" data-t="lbl_results"></div>
    <div class="nav-item" id="nav-wip" onclick="go('wip')"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.534 7h3.932a.25.25 0 01.192.41l-1.966 2.36a.25.25 0 01-.384 0l-1.966-2.36a.25.25 0 01.192-.41zm-11 2h3.932a.25.25 0 00.192-.41L2.692 6.23a.25.25 0 00-.384 0L.342 8.59A.25.25 0 00.534 9z"/><path d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 11-.771-.636A6.002 6.002 0 0113.917 7H12.9A5.002 5.002 0 008 3zM3.1 9a5.002 5.002 0 008.757 2.182.5.5 0 11.771.636A6.002 6.002 0 012.083 9H3.1z"/></svg><span data-t="wip_title"></span></div>
    <div class="nav-item" id="nav-results" onclick="go('results')"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 11H2v3h2v-3zm5-4H7v7h2V7zm5-5h-2v12h2V2z"/></svg><span data-t="nav_results"></span></div>
    <div class="nav-item" id="nav-gantt" onclick="go('gantt')"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8.5 3.5a.5.5 0 00-1 0V9a.5.5 0 00.252.434l3.5 2a.5.5 0 00.496-.868L8.5 8.71V3.5z"/><path d="M8 16A8 8 0 108 0a8 8 0 000 16z"/></svg><span data-t="nav_gantt"></span></div>
  </div>
</div>
<div class="main">

<!-- SIMS -->
<div id="page-sims" class="page active">
  <div class="sec-title">🗂 <span data-t="pg_sims_title"></span></div>

let lang='sk';
function tr(k){return(TR[lang]||TR.sk)[k]||TR.sk[k]||k;}
function setLang(l){lang=l;document.querySelectorAll('[data-t]').forEach(el=>el.textContent=tr(el.getAttribute('data-t')));renderCur();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── STATE ──────────────────────────────────────────
let S={curSim:null,sims:{}};
function uid(){return '_'+Math.random().toString(36).substr(2,9);}
function downloadExport(){
  const s=sim();if(!s)return;
  const json=JSON.stringify(s,null,2);
  const blob=new Blob([json],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(s.name||'simulation').replace(/[^a-z0-9_-]/gi,'_')+'.txt';
  a.click();URL.revokeObjectURL(a.href);
}

function sv(){
  _modelDirty=true;try{localStorage.setItem('msf3',JSON.stringify(S));}catch(e){}}
function ld(){try{const d=localStorage.getItem('msf3');if(d)S=JSON.parse(d);}catch(e){}}
function sim(){return S.curSim?S.sims[S.curSim]:null;}

// ── NAV ────────────────────────────────────────────
let curPage='sims';
function go(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  const n=document.getElementById('nav-'+p);if(n)n.classList.add('active');
  curPage=p;rPage(p);
}
function renderCur(){rPage(curPage);const s=sim();document.getElementById('simBadge').textContent=s?s.name:'—';}
function rPage(p){
  if(p==='sims')rSims();if(p==='machines')rMachines();if(p==='ops')rOps();
  if(p==='acts')rActs();if(p==='products')rProds();if(p==='seqs')rSeqs();
  if(p==='gantt'){
    renderGanttOrderEditor();
    // Auto-regenerate if model changed since last simulation
    if(simRes && _modelDirty){
      runAndShow();
      _modelDirty=false;
    } else if(!simRes){
      // No results yet — show empty state
    } else {
      renderGantt();
    }
  }
}

// ── SIMS ───────────────────────────────────────────
function newSim(){
  const defName='Sim '+(Object.keys(S.sims).length+1);
  openModal(tr('sim_name_prompt'),
    `<div class="fg"><label class="fl">${tr('sim_name_prompt')}</label><input class="fi" id="newSimName" value="${esc(defName)}" placeholder="${esc(defName)}" autofocus></div>`,
    ()=>{
      const name=document.getElementById('newSimName').value.trim()||defName;
      const id=uid();
      S.sims[id]={id,name,created:new Date().toISOString(),machines:[],operators:[],activities:[],sequences:{},ganttOrder:[]};
      S.curSim=id;sv();closeModal();renderCur();go('machines');
    }
  );
  // autofocus after modal opens
  setTimeout(()=>{const el=document.getElementById('newSimName');if(el){el.focus();el.select();}},80);
}
function actSim(id){S.curSim=id;sv();renderCur();go('machines');}
function delSim(id){
  openModal('⚠️ '+tr('confirm_del'),
    `<div class="al al-w">${tr('confirm_del')} <b>${esc((S.sims[id]||{}).name||'')}</b>?</div>`,
    ()=>{delete S.sims[id];if(S.curSim===id)S.curSim=null;sv();closeModal();rSims();document.getElementById('simBadge').textContent=sim()?sim().name:'—';}
  );
}
function expSim(id){
  const s=S.sims[id];if(!s)return;
  const json=JSON.stringify(s,null,2);
  // Direct download as .txt
  const blob=new Blob([json],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(s.name||'simulation').replace(/[^a-z0-9_-]/gi,'_')+'.txt';
  a.click();URL.revokeObjectURL(a.href);
  // Also show in modal for copy/paste fallback
  openModal('📤 Export — '+esc(s.name),
    `<div class="fg"><label class="fl" style="margin-bottom:8px">Súbor bol stiahnutý ako .txt · JSON pre prípadné kopírovanie:</label>
     <textarea class="fi" id="exportTA" rows="14" style="font-family:monospace;font-size:11px;resize:vertical" readonly>${esc(json)}</textarea></div>
     <button class="btn btn-s btn-sm" style="margin-top:6px" onclick="document.getElementById('exportTA').select();document.execCommand('copy');this.textContent='✓ Skopírované!'">📋 Kopírovať</button>`,
    null
  );
  // save button hidden automatically (onSave=null passed to openModal)
  setTimeout(()=>{const ta=document.getElementById('exportTA');if(ta){ta.focus();ta.select();}},80);
}

function trigImport(){
  openModal('📥 Import JSON',
    `<div class="fg"><label class="fl">Vložte JSON obsah simulácie:</label>
     <textarea class="fi" id="importTA" rows="14" style="font-family:monospace;font-size:11px;resize:vertical" placeholder='{ "id": "...", "name": "...", ... }'></textarea></div>`,
    ()=>{
      const raw=document.getElementById('importTA').value.trim();
      if(!raw)return;
      try{
        const s=JSON.parse(raw);
        if(!s.id)s.id=uid();
        if(!s.machines)s.machines=[];
        if(!s.operators)s.operators=[];
        if(!s.activities)s.activities=[];
        if(!s.sequences)s.sequences={};
        if(!s.products)s.products=[];
        S.sims[s.id]=s;S.curSim=s.id;sv();closeModal();renderCur();go('machines');
      }catch(err){
        document.getElementById('importTA').style.borderColor='var(--red)';
        document.getElementById('importTA').placeholder='❌ Neplatný JSON — skontrolujte formát';
      }
    }
  );
}


function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const s=JSON.parse(ev.target.result);if(!s.id)s.id=uid();if(!s.machines)s.machines=[];if(!s.operators)s.operators=[];if(!s.activities)s.activities=[];if(!s.sequences)s.sequences={};if(!s.products)s.products=[];S.sims[s.id]=s;S.curSim=s.id;sv();renderCur();go('machines');}catch(err){}};r.readAsText(f);e.target.value='';}
function rSims(){const el=document.getElementById('simList');const list=Object.values(S.sims);if(!list.length){el.innerHTML=`<div class="empty"><p>${tr('no_sims')}</p></div>`;return;}el.innerHTML=list.map(s=>`<div class="sim-item ${S.curSim===s.id?'cur':''}" onclick="actSim('${s.id}')"><div><div style="font-weight:500">${esc(s.name)}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${tr('sim_created')}: ${new Date(s.created).toLocaleDateString()} · ${(s.machines||[]).length} ${tr('m_count')} · ${(s.operators||[]).length} ${tr('op_count')}</div></div><div style="display:flex;gap:6px" onclick="event.stopPropagation()"><button class="btn btn-sm btn-s" onclick="expSim('${s.id}')">${tr('btn_export')}</button><button class="btn btn-sm btn-d" onclick="delSim('${s.id}')">${tr('btn_delete')}</button></div></div>`).join('');}

// ── MACHINES ───────────────────────────────────────
function rMachines(){
  const s=sim();const el=document.getElementById('machList');
  if(!s){el.innerHTML=`<div class="al al-w">${tr('no_sims')}</div>`;return;}
  if(!s.machines.length){el.innerHTML=`<div class="empty"><p>${tr('no_machines')}</p></div>`;return;}
  el.innerHTML=`<div class="al al-i xs" style="margin-bottom:10px">☰ ${tr('drag_reorder')}</div>
  <div class="tw"><table><thead><tr><th style="width:32px"></th><th style="width:14px"></th><th>${tr('f_mach_name')}</th><th>${tr('f_desc')}</th><th></th></tr></thead>
  <tbody id="machTbody">${s.machines.map((m,i)=>`
    <tr class="sortable-row" draggable="true" id="mrow_${m.id}"
      ondragstart="rowDragStart(event,'mach','${m.id}')"
      ondragover="rowDragOver(event,this)"
      ondragleave="rowDragLeave(this)"
      ondrop="rowDrop(event,'mach','${m.id}')">
      <td><span class="drag-handle" title="${tr('drag_reorder')}">☰</span></td>
      <td><span class="mach-dot" style="background:${m.color}"></span></td>
      <td><strong>${esc(m.name)}</strong></td>
      <td class="muted xs">${esc(m.desc||'')}</td>
      <td><div style="display:flex;gap:5px">
        <button class="btn btn-sm btn-s" onclick="showMachModal('${m.id}')">${tr('btn_edit')}</button>
        <button class="btn btn-sm btn-d" onclick="delMach('${m.id}')">${tr('btn_delete')}</button>
      </div></td>
    </tr>`).join('')}
  </tbody></table></div>`;
}
let _eid=null,_sv=null;

let _modalOk=null;
function openModal(title, body, onOk){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  _modalOk=onOk||null;
  // OK button always visible, calls _modalOk if set
  document.getElementById('overlay').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('overlay').classList.add('hidden');
  _modalOk=null;
}
function modalOk(){if(_modalOk){_modalOk();}}
function ocOverlay(e){if(e.target===document.getElementById('overlay'))closeModal();}


function showPeriodicModal(id){
  const s=sim();if(!s)return;
  _eid=id||null;
  const a=id?s.activities.find(x=>x.id===id&&x.periodic):null;
  const prioOpts=Array.from({length:10},(_,i)=>i+1).map(n=>`<option value="${n}" ${(a?.priority||2)===n?'selected':''}>${n}</option>`).join('');
  const mOpts='<option value="">—</option>'+s.machines.map(m=>`<option value="${m.id}" ${a?.machineId===m.id?'selected':''}>${esc(m.name)}</option>`).join('');
  const oOpts='<option value="">—</option>'+s.operators.map(o=>`<option value="${o.id}" ${a?.operatorId===o.id?'selected':''}>${esc(o.name)}</option>`).join('');
  const trigType=a?.triggerType||'parts';
  const unit=a?.triggerUnit||'min';
  const body=`
    <div class="al al-i xs" style="margin-bottom:12px">${tr('periodic_hint')}</div>

    <div class="fg">
      <label class="fl">${tr('f_act_name')}</label>
      <input class="fi" id="pa_name" value="${esc(a?.name||'')}">
    </div>

    <div class="fr2">
      <div class="fg">
        <label class="fl">${tr('f_op')}</label>
        <select class="fsel" id="pa_op">${oOpts}</select>
      </div>
      <div class="fg">
        <label class="fl">${tr('f_mach')}</label>
        <select class="fsel" id="pa_mach">${mOpts}</select>
      </div>
    </div>

    <hr style="border-color:var(--border);margin:10px 0">

    <div class="fr2">

    const obj={
      id:_eid||uid(), name,
      periodic:true,
      triggerType:ttype, triggerN, triggerOffset:parseInt(document.getElementById('pa_offset').value)||0,

function palDragStart(e,actId){_dragAct={actId,fromOpId:null,fromIdx:-1};e.dataTransfer.effectAllowed='copy';}
function sbDragStart(e,opId,idx,actId){_dragAct={actId,fromOpId:opId,fromIdx:idx};e.dataTransfer.effectAllowed='move';}
function sbDragEnd(e){document.querySelectorAll('.seq-track').forEach(t=>t.classList.remove('dragover'));}
function sbDragOver(e,el){e.preventDefault();}
function trackDragOver(e,el){e.preventDefault();el.classList.add('dragover');}
function trackDrop(e,opId){
  e.preventDefault();
  document.querySelectorAll('.seq-track').forEach(t=>t.classList.remove('dragover'));
  if(!_dragAct)return;
  const s=sim();if(!s)return;
  if(!s.sequences[opId])s.sequences[opId]=[];
  if(_dragAct.fromOpId===opId&&_dragAct.fromIdx>=0){
    // reorder within same lane — move to end
    const seq=s.sequences[opId];
    const[item]=seq.splice(_dragAct.fromIdx,1);
    seq.push(item);
  } else if(_dragAct.fromOpId&&_dragAct.fromOpId!==opId){
    // move between lanes
    const srcSeq=s.sequences[_dragAct.fromOpId]||[];
    const[item]=srcSeq.splice(_dragAct.fromIdx,1);
    s.sequences[opId].push(item);
  } else {
    s.sequences[opId].push(_dragAct.actId);
  }
  _dragAct=null;sv();rSeqs();
}
function sbDropOn(e,opId,idx){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.seq-track').forEach(t=>t.classList.remove('dragover'));
  if(!_dragAct)return;
  const s=sim();if(!s)return;
  if(!s.sequences[opId])s.sequences[opId]=[];
  const seq=s.sequences[opId];
  if(_dragAct.fromOpId===opId&&_dragAct.fromIdx>=0){
    const[item]=seq.splice(_dragAct.fromIdx,1);
    const newIdx=idx>_dragAct.fromIdx?idx-1:idx;
    seq.splice(newIdx,0,item);
  } else if(_dragAct.fromOpId&&_dragAct.fromOpId!==opId){
    const srcSeq=s.sequences[_dragAct.fromOpId]||[];
    const[item]=srcSeq.splice(_dragAct.fromIdx,1);
    seq.splice(idx,0,item);
  } else {
    seq.splice(idx,0,_dragAct.actId);
  }
  _dragAct=null;sv();rSeqs();
}
function rmSeqItem(opId,idx){const s=sim();if(!s)return;s.sequences[opId]=(s.sequences[opId]||[]).filter((_,i)=>i!==idx);sv();rSeqs();}

// DRAG-SORT for machines and operators

let _dragRowType=null, _dragRowId=null;
let _modelDirty=false;

function rowDragStart(e, type, id){
  _dragRowType=type; _dragRowId=id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function rowDragOver(e, el){
  e.preventDefault();
  document.querySelectorAll('.sortable-row').forEach(r=>r.classList.remove('drag-over'));
  el.classList.add('drag-over');
}
function rowDragLeave(el){ el.classList.remove('drag-over'); }
function rowDrop(e, type, targetId){
  e.preventDefault();
  document.querySelectorAll('.sortable-row').forEach(r=>{r.classList.remove('drag-over');r.classList.remove('dragging');});
  if(!_dragRowId||_dragRowType!==type||_dragRowId===targetId) return;
  const s=sim(); if(!s) return;
  const arr = type==='mach' ? s.machines : s.operators;
  const fromIdx = arr.findIndex(x=>x.id===_dragRowId);
  const toIdx   = arr.findIndex(x=>x.id===targetId);
  if(fromIdx===-1||toIdx===-1) return;
  const [item] = arr.splice(fromIdx,1);
  arr.splice(toIdx,0,item);
  _dragRowId=null;
  sv();
  if(type==='mach') rMachines();
  else rOps();
  // also update ganttOrder if it exists
  if(s.ganttOrder&&s.ganttOrder.length>0){
    const gFrom=s.ganttOrder.findIndex(x=>x.id===_dragRowId);
    // ganttOrder is independent, don't auto-sync
  }
}

// ── GANTT ROW ORDER ──────────────────────────────────────────────────
// ganttOrder = [{id, type:'mach'|'op'}] — if empty, use default order

function getGanttOrder(s){
  if(!s.ganttOrder||!s.ganttOrder.length){
    // Build default: machines first, then operators
    return [
      ...s.machines.map(m=>({id:m.id,type:'mach'})),
      ...s.operators.map(op=>({id:op.id,type:'op'}))
    ];
  }
  // Merge: add any new machines/ops not yet in ganttOrder
  const existing = new Set(s.ganttOrder.map(x=>x.id));
  const extra = [
    ...s.machines.filter(m=>!existing.has(m.id)).map(m=>({id:m.id,type:'mach'})),
    ...s.operators.filter(op=>!existing.has(op.id)).map(op=>({id:op.id,type:'op'}))
  ];
  return [...s.ganttOrder, ...extra];
}

function renderGanttOrderEditor(){
  const s=sim(); if(!s) return;
  const order=getGanttOrder(s);
  const el=document.getElementById('ganttOrderEditor');
  if(!el) return;
  el.innerHTML=order.map((item,i)=>{
    let name,color,icon;
    if(item.type==='mach'){
      const m=s.machines.find(x=>x.id===item.id); if(!m) return '';
      name=m.name; color=m.color; icon=`<span class="mach-dot" style="background:${color}"></span>`;
    } else {
      const op=s.operators.find(x=>x.id===item.id); if(!op) return '';
      name=op.name; color='#58a6ff'; icon='👤';
    }
    return `<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)">
      <span class="xs muted" style="width:18px;text-align:right">${i+1}</span>
      ${icon}
      <span style="font-size:12px;flex:1">${esc(name)}</span>
      <span class="xs muted">${item.type==='mach'?'⚙️':'👤'}</span>
      <div style="display:flex;flex-direction:column;gap:1px">
        ${i>0?`<button class="btn btn-g" style="padding:1px 5px;font-size:11px;line-height:1" onclick="moveGanttRow('${item.id}',-1)" title="Hore">▲</button>`:'<span style="width:23px"></span>'}
        ${i<order.length-1?`<button class="btn btn-g" style="padding:1px 5px;font-size:11px;line-height:1" onclick="moveGanttRow('${item.id}',1)" title="Dole">▼</button>`:'<span style="width:23px"></span>'}
      </div>
    </div>`;
  }).join('');
}

function moveGanttRow(id, dir){
  const s=sim(); if(!s) return;
  const order=getGanttOrder(s);
  const idx=order.findIndex(x=>x.id===id);
  const nIdx=idx+dir;
  if(idx===-1||nIdx<0||nIdx>=order.length) return;
  [order[idx],order[nIdx]]=[order[nIdx],order[idx]];
  s.ganttOrder=order;
  sv();
  renderGanttOrderEditor();
}

function resetGanttOrder(){
  const s=sim(); if(!s) return;
  s.ganttOrder=[];
  sv();
  renderGanttOrderEditor();
}

function toggleGanttOrder(){
  const panel=document.getElementById('ganttOrderPanel');
  const btn=document.getElementById('ganttOrderToggleBtn');
  if(panel.classList.contains('hidden')){
    panel.classList.remove('hidden');
    renderGanttOrderEditor();
    if(btn) btn.innerHTML=btn.innerHTML.replace('▾','▴');
  } else {
    panel.classList.add('hidden');
    if(btn) btn.innerHTML=btn.innerHTML.replace('▴','▾');
  }
}

function runWip(){
  const s=sim();if(!s)return;
  const shiftSec=(parseFloat(document.getElementById('wipShiftH')?.value)||8)*3600;
  // Run base simulation first if not done
  if(!simRes){runSim();}
  if(!simRes)return;

  const prods=s.products||[];

  // Use engine's tracked WIP events directly — most accurate source
  // wipProduced[productId] = total produced during simulation
  // wipConsumed[productId] = total consumed during simulation
  const wipP = simRes.wipProduced||{};
  const wipC = simRes.wipConsumed||{};

  // Build per-product summary
  const byProd={};
  prods.forEach(p=>{
    byProd[p.id]={
      prod:p,
      totalProduced: wipP[p.id]||0,
      totalConsumed: wipC[p.id]||0,
      takt:0, taktCount:0
    };
  });

  // Get takt from activities (for display)
  s.activities.filter(a=>a.produces&&(a.cycleTime||0)>0).forEach(a=>{
    if(byProd[a.produces]){
      byProd[a.produces].takt+=a.cycleTime;
      byProd[a.produces].taktCount++;
    }
  });

  // Machine cycles per machine (for detail table)
  const machCycles={};
  simRes.machRes.forEach(m=>{machCycles[m.id]=m.cycles;});

  // Build activity detail stages
  const stages=s.activities.filter(a=>a.produces||a.consumes).map(a=>{
    const prod=a.produces?(prods.find(p=>p.id===a.produces)||null):null;
    const cons=a.consumes?(prods.find(p=>p.id===a.consumes)||null):null;
    const m=a.machineId?s.machines.find(x=>x.id===a.machineId):null;
    const cycles=m?machCycles[m.id]||0:0;
    const takt=a.cycleTime||0;
    return{act:a,prod,cons,m,cycles,producedQty:0,consumedQty:0,takt};
  });

  const el=document.getElementById('wipContent');
  if(!prods.length){el.innerHTML=`<div class="empty"><p>${tr('no_product')}</p></div>`;return;}

  // Flow diagram table
  const flowRows=prods.map(p=>{
    const d=byProd[p.id];
    const bal=d.totalProduced-d.totalConsumed;
    const avgTakt=d.taktCount>0?(d.takt/d.taktCount).toFixed(1):'-';
    const balColor=bal<0?'var(--red)':bal>0?'var(--orange)':'var(--green)';
    return`<tr>
      <td><span class="fc" style="gap:6px"><span class="mach-dot" style="background:${p.color}"></span><strong>${esc(p.name)}</strong></span></td>
      <td class="mono" style="color:var(--green)">${d.totalProduced}</td>
      <td class="mono" style="color:var(--red)">${d.totalConsumed}</td>
      <td class="mono" style="color:${balColor};font-weight:700">${bal>=0?'+':''}${bal}</td>
      <td class="mono">${avgTakt}s</td>
    </tr>`;
  }).join('');

  // Activity detail table
  const actRows=stages.map(st=>{
    const m=st.m;
    return`<tr>
      <td>${st.prod?`<span class="fc" style="gap:5px"><span class="mach-dot" style="background:${st.prod.color}"></span>${esc(st.prod.name)}</span>`:'-'}</td>
      <td>${esc(st.act.name)}</td>
      <td>${m?`<span class="fc" style="gap:5px"><span class="mach-dot" style="background:${m.color}"></span>${esc(m.name)}</span>`:'-'}</td>
      <td class="mono">${st.cycles}</td>
      <td class="mono" style="color:var(--green)">${st.producedQty}</td>
      <td class="mono">${st.takt||'-'}s</td>
      <td>${st.cons?`<span class="fc" style="gap:5px"><span class="mach-dot" style="background:${st.cons.color}"></span>${esc(st.cons.name)}</span>`:'-'}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`
  <div class="card">
    <div class="card-hdr"><div class="card-title">📦 ${tr('wip_title')}</div></div>
    <div class="tw"><table>
      <thead><tr><th>${tr('wip_stage')}</th><th>${tr('wip_produced')}</th><th>${tr('wip_consumed')}</th><th>${tr('wip_balance')}</th><th>${tr('wip_takt')}</th></tr></thead>
      <tbody>${flowRows}</tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="card-hdr"><div class="card-title">🔬 Detail aktivít</div></div>
    <div class="tw"><table>
      <thead><tr><th>${tr('f_produces')}</th><th>${tr('f_act_name')}</th><th>${tr('f_mach')}</th><th>Cyklov</th><th>${tr('wip_produced')}</th><th>${tr('wip_takt')}</th><th>${tr('f_consumes')}</th></tr></thead>
      <tbody>${actRows||'<tr><td colspan="7" class="muted xs">—</td></tr>'}</tbody>
    </table></div>
  </div>`;
}


// ══════════════════════════════════════════════════
// SIMULATION ENGINE
// ══════════════════════════════════════════════════
let simRes=null,simTL=null;

function runSim(){
  const s=sim();if(!s)return null;
  const shiftSec=(parseFloat(document.getElementById('shiftH')?.value)||8)*3600;
  const quality=(parseFloat(document.getElementById('qualityPct')?.value)||100)/100;

  const ms={};
  s.machines.forEach(m=>{ms[m.id]={busyUntil:0,cycles:0,runTime:0,waitTime:0,idleTime:0,waitForOp:0,cyclesSinceChange:{}};});

  // ── Periodic activity tracking ─────────────────────────────────────
  // periodicState[actId] = {lastCycles: {machId: N}, nextTimeTrigger: T, done: bool}
  const periodicActs=(s.activities||[]).filter(a=>a.periodic);
  const periodicState={};
  periodicActs.forEach(a=>{
    periodicState[a.id]={
      cyclesSinceLastFire:0,  // for parts-based
      lastFireTime:a.triggerOffset||0,      // for time-based
      pendingFires:0,         // queued fires
    };
  });

  // Check and queue periodic fires — called after each machine cycle update
  function checkPeriodic(t){
    periodicActs.forEach(a=>{
      const st=periodicState[a.id]; if(!st) return;
      if(a.triggerType==='time'){
        // Time-based: fire every triggerN seconds
        while(t >= st.lastFireTime + a.triggerN){
          st.lastFireTime += a.triggerN;
          if(st.lastFireTime > (a.triggerOffset||0)) st.pendingFires++;
        }
      } else {
        // Parts-based: fire every triggerN cycles of the watched machine
        if(a.machineId && ms[a.machineId]){

  }
  const os={};

  // ── WIP inventory: tracks real-time part counts per product ──────────
  // wip[productId] = current stock count

  // Helper: get cumulative stock at time T (sum of all events with time <= T)
  function wipStockAt(prodId, T){

  // ── Per-operator simulation ──────────────────────────────────────────
  // SEQUENCE RULES:
  //  - Sequence is walked STRICTLY in order (no wrap-around skipping).
  //  - The ONLY skip allowed: machine is BUSY running autonomously →
  //    operator may do next ready activity in sequence, then RETURNS
  //    to the skipped one.
  //  - WIP not available → operator WAITS at that position (no skip).

  //  - Welder (or any out-of-sequence act) fires when machine is ready.

  // ── TRUE PARALLEL PRIORITY-BASED simulation ─────────────────────────
  //
  // Each operator has a PRIORITY LIST of all their activities.
  // At each step, the operator picks the highest-priority activity
  // that is currently doable (machine free + WIP available).
  //
  // Priority is determined by activity.priority field (1=highest, 9=lowest).
  // Within same priority: prefer the one whose machine has been waiting longest.
  //
  // Sequence is used ONLY to define which activities belong to this operator.
  // The actual execution order is driven by priority + availability.
  //
  // Special: "urgent" acts (priority < 5, not in sequence) still fire first.
  //
  // ── TRUE PARALLEL PRIORITY-BASED simulation ─────────────────────────
  // Operator picks highest-priority AVAILABLE activity each step.
  // Priority = activity.priority (1=highest). Ties broken by machine idle time.
  // Sequence defines which activities belong to operator — order is dynamic.
  //
  const opAgents = s.operators.map(op=>{
    const seqIds=s.sequences[op.id]||[];
    const seqActs=seqIds.map(id=>s.activities.find(a=>a.id===id)).filter(Boolean);
    const seqIdSet=new Set(seqIds);
    // Unique acts (for lookup) — preserving sequence order
    const seen=new Set();
    const allActs=seqActs.filter(a=>{if(seen.has(a.id))return false;seen.add(a.id);return true;});
    return{op,seqActs,allActs,t:0,seqIdx:0,interrupted:null};
  }).filter(ag=>ag.allActs.length>0);

  function bestAct(ag,T){
    // Strict sequence with fill-in skipping.
    // When current step blocked: find available step on ANOTHER machine.
    // seqIdx keeps pointing to blocked step (isSkip=true, newIdx=start).
    // Cycle-count balancer: among available fill-in candidates,
    // prefer the machine with FEWEST cycles (equalizes utilization).
    const seq=ag.seqActs;
    if(!seq||!seq.length) return null;
    const start=ag.seqIdx%seq.length;
    const cur=seq[start];
    const curMachBusy=cur.machineId&&ms[cur.machineId]&&ms[cur.machineId].busyUntil>T;
    const curWipMiss=cur.consumes&&wipAvailableAt(cur.consumes,1,T)>T;

    // Current step available → execute and advance
    if(!curMachBusy&&!curWipMiss){
      if(ag.skipDone) ag.skipDone.clear();
      const nextIdx=(start+1)%seq.length;
      if(nextIdx===0) ag.skipOffset=0;
      return{act:cur, newIdx:nextIdx, isSkip:false};
    }

    // Current step blocked → look for fill-in on another machine
    if(!ag.skipDone) ag.skipDone=new Set();
    const candidates=[];
    for(let look=1;look<seq.length;look++){
      const idx2=(start+look)%seq.length;
      const alt=seq[idx2];
      if(!alt.machineId) continue;
      if(alt.machineId===cur.machineId) continue;
      if(ag.skipDone.has(alt.machineId)) continue;
      if(ms[alt.machineId]&&ms[alt.machineId].busyUntil>T) continue;
      if(alt.consumes&&wipAvailableAt(alt.consumes,1,T)>T) continue;
      candidates.push({alt,idx2});
    }
    if(candidates.length>0){
      // Sort by machine cycle count ascending → least-used machine gets priority
      candidates.sort((a,b)=>(ms[a.alt.machineId]?.cycles||0)-(ms[b.alt.machineId]?.cycles||0));
      const pick=candidates[0];

    }
    return null;
  }
  function nextDoableTime(ag,T){
    let ne=shiftSec;
    for(const a of ag.seqActs){
      if(a.machineId&&ms[a.machineId]&&ms[a.machineId].busyUntil>T)ne=Math.min(ne,ms[a.machineId].busyUntil);
      if(a.consumes){const av=wipAvailableAt(a.consumes,1,T);if(av<Infinity&&av>T)ne=Math.min(ne,av);}

    // Advance by small chunk so the other operator can produce events first.

  let globalItr=0; const MAX_ITR=2000000;
  while(globalItr<MAX_ITR){
    globalItr++;
    let ag=null,minT=shiftSec;
    for(const a of opAgents){if(a.t<minT){minT=a.t;ag=a;}}
    if(!ag||ag.t>=shiftSec)break;
    const{op}=ag; let t=ag.t;

    // Resume interrupted activity
    if(ag.interrupted){
      const{act:iA,remaining:rem}=ag.interrupted;
      const wEnd=Math.min(t+rem,shiftSec);const wkd=wEnd-t;

      t=wEnd;ag.t=t;ag.interrupted=null;
      if(t<shiftSec){
        const tId=iA.triggersMachine||iA.machineId;const mTk=iA.cycleTime||0;
        if(tId&&mTk>0){const mst=ms[tId];if(mst){const cc=Math.max(iA.cycleCount||1,1);let cs=Math.max(t,mst.busyUntil);for(let ci=0;ci<cc;ci++){const ce=Math.min(cs+mTk,shiftSec);if(ce<=cs)break;tl[tId].push({start:cs,end:ce,type:'run',label:'▶',actId:iA.id});mst.runTime+=(ce-cs);mst.cycles++;if(iA.produces)wipProduce(iA.produces,iA.producesQty||1,ce);cs=ce;}mst.busyUntil=cs;}}

        a.operatorId===op.id&&(periodicState[a.id]?.pendingFires||0)>0);

        if(pEnd>changeStart){
          if(changeStart>t){
            tl[op.id].push({start:t,end:changeStart,type:'idle',label:'—',actId:null});
          }
          tl[op.id].push({start:changeStart,end:pEnd,type:'op',label:'⏱ '+pa.name,actId:pa.id});
          os[op.id].activeTime+=(pEnd-changeStart);
          if(pa.blocksMachine&&pa.machineId&&ms[pa.machineId]){
            const mst3=ms[pa.machineId];
            tl[pa.machineId].push({start:changeStart,end:pEnd,type:'wait',label:'🔧',actId:pa.id});

      const ne=nextDoableTime(ag,t);const ie=Math.min(ne,shiftSec);

    }
    const act=_br.act;
    if(!_br.isSkip){
      ag.seqIdx=_br.newIdx; // advance on normal step
      ag.skipDone=new Set(); // reset skip set when sequence advances
    }
    const machTakt=act.cycleTime||0;

    if(act.consumes){
      const avT=wipAvailableAt(act.consumes,1,t);
      if(avT===Infinity){const ne=nextDoableTime(ag,t);const ie=Math.min(ne,shiftSec);tl[op.id].push({start:t,end:ie,type:'idle',label:'—',actId:null});ag.t=ie;continue;}
      if(avT>t){const wEnd=Math.min(avT,shiftSec);tl[op.id].push({start:t,end:wEnd,type:'wipwait',label:'📦 '+((s.products||[]).find(p=>p.id===act.consumes)?.name||'?'),actId:act.id});os[op.id].waitTime+=(wEnd-t);actWait[act.id].totalWait+=(wEnd-t);actWait[act.id].count++;t=wEnd;ag.t=t;if(t>=shiftSec)continue;}

    if(trigId&&machTakt>0&&t<=shiftSec){const mst=ms[trigId];if(mst){const cyc=Math.max(act.cycleCount||1,1);let cS=Math.max(t,mst.busyUntil);for(let ci=0;ci<cyc;ci++){const cE=Math.min(cS+machTakt,shiftSec);if(cE<=cS)break;tl[trigId].push({start:cS,end:cE,type:'run',label:'▶'+(cyc>1?` ${ci+1}/${cyc}`:''),actId:act.id});mst.runTime+=(cE-cS);mst.cycles++;if(act.produces)wipProduce(act.produces,act.producesQty||1,cE);cS=cE;}mst.busyUntil=cS;}}
    if(act.produces&&(!trigId||machTakt===0))wipProduce(act.produces,act.producesQty||1,t);

    // ── Tool change check ─────────────────────────────────────────
    if((act.changeEvery||0)>0&&trigId&&ms[trigId]){

      const prevCyc=mst2.cyclesSinceChange[act.id]||0;
      const addCyc=Math.max(act.cycleCount||1,1);
      const newCyc=prevCyc+addCyc;
      const changes=Math.floor(newCyc/act.changeEvery)-Math.floor(prevCyc/act.changeEvery);
      mst2.cyclesSinceChange[act.id]=newCyc%act.changeEvery;
      if(changes>0&&t<shiftSec){
        // Tool change: operator stops to change tool, machine also stopped

        for(let ch=0;ch<changes;ch++){

          const chE=Math.min(chS+changeDur,shiftSec);
          if(chE<=chS)break;

          tl[trigId].push({start:chS,end:chE,type:'wait',label:'🔧',actId:act.id});
          mst2.waitTime+=(chE-chS);
          mst2.busyUntil=chE;
          // Operator works tool change
          tl[op.id].push({start:t,end:Math.min(t+changeDur,shiftSec),type:'op',label:'🔧 '+act.name,actId:act.id});

          if(t>=shiftSec)break;
        }
      }
    }

  }// while globalItr





  // ── Machine wait/idle fill ────────────────────────────────────────────
  s.machines.forEach(m=>{
    const mst=ms[m.id];
    const evs=tl[m.id].slice().sort((a,b)=>a.start-b.start);
    let prev=0;
    evs.forEach(ev=>{

  s.operators.forEach(op=>{

    evs.forEach(ev=>{if(ev.start>prev){tl[op.id].push({start:prev,end:ev.start,type:'idle',label:'—',actId:null});}prev=Math.max(prev,ev.end);});

  const machRes=s.machines.map(m=>{
    const mst=ms[m.id];
    const avail=mst.cycles>0?mst.runTime/shiftSec:0;
    const actsTakt=s.activities.filter(a=>(a.triggersMachine===m.id||a.machineId===m.id)&&a.cycleTime>0);
    const avgTakt=actsTakt.length?actsTakt.reduce((s2,a)=>s2+a.cycleTime,0)/actsTakt.length:1;

    // = actual cycles vs max possible in the time it was running

    const perf=runCycleMax>0?Math.min(mst.cycles/runCycleMax,1):0;
    // OEE = A × P × Q (standard)
    const oee=avail*perf*quality;
    // Also keep theoMax for reference
    const theoMax=Math.floor(shiftSec/avgTakt);

  });

  simTL=tl;

  // ── SELF-CHECK ────────────────────────────────────────────────────
  const _warns=[];
  // Check 1: zero output with active machines

  // Check 2: operator fully idle
  opRes.forEach(o=>{

  });
  // Check 3: WIP imbalance — produced but never consumed
  Object.entries(wipProduced).forEach(([pid,prod])=>{
    const cons=wipConsumed[pid]||0;
    if(prod>0 && cons===0){
      const pName=(s.products||[]).find(p=>p.id===pid)?.name||pid;
      _warns.push(`⚠️ WIP '${pName}': vyprodukovaný (${prod}ks) ale nikdy nespotrebovaný.`);
    }
  });
  // Check 4: activities with consumes but zero WIP consumed
  s.activities.filter(a=>a.consumes).forEach(a=>{
    if((wipConsumed[a.consumes]||0)===0){
      const pName=(s.products||[]).find(p=>p.id===a.consumes)?.name||a.consumes;
      _warns.push(`⚠️ '${a.name}': nikdy nespotreboval WIP '${pName}' — chýba producent?`);

  if(globalItr>=MAX_ITR)

}


// ── GANTT ──────────────────────────────────────────────────────────
const GANTT_W=1600;

function loadExample(idx){
  const ex=window._examples[idx];
  if(!ex) return;
  // Give fresh IDs to avoid conflicts
  const s=JSON.parse(JSON.stringify(ex.data));
  s.id=uid();
  S.sims[s.id]=s; S.curSim=s.id; sv();
  closeModal();
  renderCur(); go('gantt');
  runAndShow();
}

function hardReload(){
  // Force bypass cache — equivalent to Ctrl+Shift+R
  if('caches' in window){
    caches.keys().then(names=>names.forEach(n=>caches.delete(n)));
  }
  // Add cache-busting timestamp to URL
  const url=window.location.href.split('?')[0]+'?v='+Date.now();
  window.location.replace(url);
}

function ganttPan(dir){
  if(!simRes) return;
  const shiftSec=simRes.shiftSec;
  const step=ganttDispSec*0.5; // pan by half the window
  ganttOffset=Math.max(0,Math.min(ganttOffset+dir*step, shiftSec-ganttDispSec));
  renderGantt();
}

function ganttPanTo(pct){
  if(!simRes) return;
  const shiftSec=simRes.shiftSec;
  const maxOffset=Math.max(0,shiftSec-ganttDispSec);
  ganttOffset=Math.round(pct/100*maxOffset);
  renderGantt();
}

function renderGantt(){
  if(!simTL||!simRes)return;
  const s=sim();if(!s)return;
  const shiftSec=simRes.shiftSec;
  const zoomEl=document.getElementById('ganttZoom');
  const zoomVal=zoomEl?zoomEl.value:'full';
  let dispSec=shiftSec;
  if(zoomVal==='15min') dispSec=900;
  else if(zoomVal==='30min') dispSec=1800;
  else if(zoomVal==='1h') dispSec=3600;
  else if(zoomVal==='2h') dispSec=7200;
  else dispSec=shiftSec; // 'full'
  ganttDispSec=dispSec;
  // Clamp offset to valid range
  const maxOffset=Math.max(0,shiftSec-dispSec);
  ganttOffset=Math.max(0,Math.min(ganttOffset,maxOffset));
  const winStart=ganttOffset;
  const winEnd=ganttOffset+dispSec;

  // Update pan slider and offset label
  const ps=document.getElementById('ganttPanSlider');
  if(ps){ps.max=100;ps.value=maxOffset>0?Math.round(ganttOffset/maxOffset*100):0;
    ps.style.display=maxOffset>0?'':'none';}
  const ol=document.getElementById('ganttOffsetLabel');
  if(ol) ol.textContent=ganttOffset>0?fmt(ganttOffset):'';
  const pb=document.querySelectorAll('.gantt-pan-btn');
  pb.forEach(b=>b.style.display=maxOffset>0?'':'none');

  const sc=GANTT_W/dispSec;
  const rows=[];
  const ganttOrder=getGanttOrder(s);
  ganttOrder.forEach(item=>{
    if(item.type==='mach'){
      const m=s.machines.find(x=>x.id===item.id);if(!m)return;
      // Only events visible in [winStart, winEnd]
      const evs=(simTL[m.id]||[]).filter(e=>e.end>winStart&&e.start<winEnd).sort((a,b)=>a.start-b.start);
      const blks=evs.map(e=>{
        const x=Math.max(0,(e.start-winStart)*sc);
        const x2=Math.min(GANTT_W,(e.end-winStart)*sc);
        const w=Math.max(2,x2-x);
        const act=e.actId?s.activities.find(a=>a.id===e.actId):null;
        const actColor=act?.color||null;
        const colorStyle=actColor&&e.type==='run'?`background:${actColor};border-color:${actColor}`:'';
        return`<div class="gblk gb-${e.type}" style="left:${x.toFixed(1)}px;width:${w.toFixed(1)}px;${colorStyle}" title="${esc(act?act.name:e.label||'')} ${fmt(e.start)}–${fmt(e.end)}">${w>30?(act?esc(act.name.substr(0,10)):(e.label||'')):''}</div>`;
      }).join('');
      rows.push(`<div class="gantt-row"><div class="g-row-lbl"><span class="mach-dot" style="background:${m.color}"></span>${esc(m.name)}</div><div class="g-track" style="width:${GANTT_W}px" id="gt_${m.id}">${blks}</div></div>`);
    } else {
      const op=s.operators.find(x=>x.id===item.id);if(!op)return;
      const evs=(simTL[op.id]||[]).filter(e=>e.end>winStart&&e.start<winEnd).sort((a,b)=>a.start-b.start);
      const blks=evs.map(e=>{
        const x=Math.max(0,(e.start-winStart)*sc);
        const x2=Math.min(GANTT_W,(e.end-winStart)*sc);
        const w=Math.max(2,x2-x);
        const act=e.actId?s.activities.find(a=>a.id===e.actId):null;
        const actColor=act?.color||null;
        const colorStyle=actColor&&e.type==='op'?`background:${actColor};border-color:${actColor}`:'';
        return`<div class="gblk gb-${e.type}" style="left:${x.toFixed(1)}px;width:${w.toFixed(1)}px;${colorStyle}" title="${esc(e.label||act?.name||'')} ${fmt(e.start)}–${fmt(e.end)}">${w>45?esc((e.label||act?.name||'').substr(0,14)):''}</div>`;
      }).join('');
      rows.push(`<div class="gantt-row"><div class="g-row-lbl">👤 ${esc(op.name)}</div><div class="g-track" style="width:${GANTT_W}px">${blks}</div></div>`);
    }
  });

  // Time axis — show absolute times
  const tickInterval=dispSec<=900?60:dispSec<=3600?300:dispSec<=7200?600:1800;
  let ticks='';
  for(let t=winStart;t<=winEnd;t+=tickInterval){
    const x=((t-winStart)/dispSec*GANTT_W).toFixed(1);
    ticks+=`<div class="g-tick" style="left:${x}px">${fmt(t)}</div>`;
  }

  const el=document.getElementById('ganttArea');
  el.innerHTML=`
    <div class="gantt-wrap">
      <div class="g-axis" style="width:${GANTT_W}px;margin-left:160px">${ticks}</div>
      <div class="g-rows">${rows.join('')}</div>
    </div>`;

  // Legend
  const legEl=document.getElementById('ganttLegend');
  if(legEl) legEl.style.display='flex';

  seekTo(ganttCurSec);
}

function seekTo(sec){
  ganttCurSec=Math.max(0,Math.min(sec,ganttDispSec||simRes?.shiftSec||28800));
  const s=sim();if(!simTL||!s)return;
  const dispSec=ganttDispSec||simRes.shiftSec;
  const sc=GANTT_W/dispSec;

  // Sync slider
  const slider=document.getElementById('pbSlider');
  if(slider){slider.max=Math.round(dispSec);slider.value=Math.round(ganttCurSec);}
  const timeEl=document.getElementById('pbTimeDisplay');
  if(timeEl) timeEl.textContent=fmt(ganttCurSec);

  // Draw cursor line on every track
  document.querySelectorAll('.g-track').forEach(tr=>{
    let cur=tr.querySelector('.g-cursor');
    if(!cur){cur=document.createElement('div');cur.className='g-cursor';tr.appendChild(cur);}
    const curX=(ganttCurSec-ganttOffset)*sc;
    cur.style.left=curX.toFixed(1)+'px';
    cur.style.display=(ganttCurSec>=ganttOffset&&ganttCurSec<=ganttOffset+ganttDispSec)?'block':'none';
  });

  // State table
  updateStateTable(ganttCurSec);
}

function updateStateTable(sec){
  const s=sim();if(!simTL||!s||!simRes)return;
  const stateColors={run:'var(--green)',wait:'var(--red)',idle:'var(--text3)',op:'var(--blue)',opwait:'var(--purple)',wipwait:'var(--acc)'};
  const stateLabels={run:tr('run_t'),wait:tr('wait_t'),idle:tr('idle_t'),op:tr('active_t'),opwait:tr('op_wait'),wipwait:tr('wip_wait')};
  const rows=[];
  const ganttOrder=getGanttOrder(s);
  ganttOrder.forEach(item=>{
    const isOp=item.type==='op';
    const entity=isOp?s.operators.find(x=>x.id===item.id):s.machines.find(x=>x.id===item.id);
    if(!entity)return;
    const evs=(simTL[item.id]||[]).sort((a,b)=>a.start-b.start);
    const active=evs.find(e=>e.start<=sec&&e.end>sec);
    const type=active?.type||'idle';
    const act=active?.actId?s.activities.find(a=>a.id===active.actId):null;
    const label=active?(act?esc(act.name):(active.label||stateLabels[type]||type)):(stateLabels['idle']||'—');
    const color=stateColors[type]||'var(--text3)';
    const dot=isOp?'👤':`<span class="mach-dot" style="background:${entity.color||'#888'}"></span>`;
    rows.push(`<tr><td>${dot} ${esc(entity.name)}</td><td><span style="color:${color};font-weight:600">${stateLabels[type]||type}</span></td><td class="xs muted">${label}</td></tr>`);
  });
  const tbl=document.querySelector('#stateTable tbody');
  if(tbl) tbl.innerHTML=rows.join('');
  // Show the wrap and update time label
  const wrap=document.getElementById('timeTableWrap');
  if(wrap) wrap.style.display='';
  const lbl=document.getElementById('ttTimeLabel');
  if(lbl) lbl.textContent=fmt(sec);
}

function togglePlay(){
  ganttPlaying=!ganttPlaying;
  const btn=document.getElementById('pbPlayBtn');
  if(btn) btn.innerHTML=ganttPlaying?'⏸':'▶';
  if(ganttPlaying) playTick();
}
function stopPlay(){
  ganttPlaying=false;
  if(ganttPlayTimer){clearTimeout(ganttPlayTimer);ganttPlayTimer=null;}
  const btn=document.getElementById('pbPlayBtn');
  if(btn) btn.innerHTML='▶';
  seekTo(0);
}
function playTick(){
  if(!ganttPlaying)return;
  const spEl=document.getElementById('pbSpeed');
  ganttSpeed=spEl?parseFloat(spEl.value)||1:1;
  const step=0.1*ganttSpeed;
  ganttCurSec+=step;
  const maxSec=ganttDispSec||simRes?.shiftSec||28800;
  if(ganttCurSec>=maxSec){ganttCurSec=maxSec;ganttPlaying=false;const btn=document.getElementById('pbPlayBtn');if(btn)btn.textContent='▶';}
  seekTo(ganttCurSec);
  if(ganttPlaying) ganttPlayTimer=setTimeout(playTick,100);
}
function onGanttSlider(val){
  const dispSec=ganttDispSec||simRes?.shiftSec||28800;
  seekTo((val/1000)*dispSec);
}
function onGanttClick(e){
  const wrap=e.currentTarget;
  const rect=wrap.getBoundingClientRect();
  const relX=e.clientX-rect.left-160;
  const dispSec=ganttDispSec||simRes?.shiftSec||28800;
  const t=Math.max(0,(relX/GANTT_W)*dispSec);
  seekTo(t);
}

function runAndShow(){runSim();renderResults();renderGantt();}
function pct(v){return(v*100).toFixed(1)+'%';}
function ftm(s){if(!s||s<=0)return'0:00';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;}
function oeeC(v){return v>=0.85?'good':v>=0.6?'warn':'bad';}

function renderResults(){
  if(!simRes)return;
  // Show self-check warnings
  const _w=simRes._warnings||[];
  const warnEl=document.getElementById('simWarnings');
  if(warnEl){
    if(_w.length>0){
      warnEl.innerHTML=_w.map(w=>`<div class="al al-w" style="margin-bottom:6px;font-size:12px">${w}</div>`).join('');
      warnEl.style.display='';
    } else {
      warnEl.innerHTML='<div class="al al-i" style="font-size:12px">✅ Self-check OK — žiadne problémy.</div>';
      warnEl.style.display='';
    }
  }
  const{machRes,opRes,lineOEE,bn,parts,theoLineMax,shiftSec,actWait}=simRes;
  const el=document.getElementById('resultsArea');
  const s=sim();

  function oeeBar(val){const cl=oeeC(val);return `<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:var(--bg4);border-radius:3px;height:8px;overflow:hidden"><div class="pf ${cl}" style="width:${(val*100).toFixed(1)}%;height:100%"></div></div><span class="mono xs ${cl}" style="width:42px;text-align:right;font-weight:700">${pct(val)}</span></div>`;}

  const lineAvail=machRes.filter(m=>m.cycles>0).length?(machRes.filter(m=>m.cycles>0).reduce((s2,m)=>s2+m.runTime,0)/(shiftSec*machRes.filter(m=>m.cycles>0).length)):0;
  const linePerf=theoLineMax>0?Math.min(parts/theoLineMax,1):0;
  const lineQual=simRes.quality;
  const bnActs=bn?s.activities.filter(a=>(a.triggersMachine===bn.id||a.machineId===bn.id)&&a.cycleTime>0):[];
  const bnTakt=bnActs.length?bnActs.reduce((s2,a)=>s2+a.cycleTime,0)/bnActs.length:0;

  const overall=`<div class="card"><div class="card-hdr"><div class="card-title">📊 ${tr('line')}</div><span class="xs muted">${tr('line_oee_note')}</span></div>
    <div class="mgrid" style="margin-bottom:14px">
      <div class="mc"><div class="ml">OEE — ${tr('line')}</div><div class="mv ${oeeC(lineOEE)}" style="margin-bottom:6px">${pct(lineOEE)}</div>
        <div class="xs muted" style="margin-bottom:4px">${tr('avail')}: <span class="${oeeC(lineAvail)}">${pct(lineAvail)}</span></div>
        <div class="xs muted" style="margin-bottom:4px">${tr('perf')}: <span class="${oeeC(linePerf)}">${pct(linePerf)}</span></div>
        <div class="xs muted">${tr('qual')}: <span class="${oeeC(lineQual)}">${pct(lineQual)}</span></div></div>
      <div class="mc"><div class="ml">${tr('actual_out')}</div><div class="mv">${parts}</div><div class="ms">${tr('theo_max')}: ${theoLineMax||'—'}</div></div>
      <div class="mc"><div class="ml">${tr('bottleneck')}</div><div class="mv warn" style="font-size:15px">${bn?`<span class="fc gap-6"><span class="mach-dot" style="background:${bn.color}"></span>${esc(bn.name)}</span>`:'—'}</div>
        <div class="ms">${bnTakt?`Takt: ${bnTakt.toFixed(1)}s`:'—'}</div></div>
    </div><div class="al al-i xs">${tr('line_oee_formula')}</div></div>`;

  const machTable=`<div class="card"><div class="card-hdr"><div class="card-title">⚙️ ${tr('oee_per_machine')}</div></div>
    <div class="tw"><table><thead><tr><th></th><th>${tr('f_mach_name')}</th><th>${tr('oee')}</th><th>${tr('avail')}</th><th>${tr('perf')}</th><th>${tr('qual')}</th><th>${tr('cycles_label')}</th><th>${tr('takt_label')}</th><th>${tr('run_t')}</th><th>${tr('wait_t')}</th><th>${tr('wait_pct')}</th></tr></thead>
    <tbody>${machRes.map(m=>{
      const acts2=s.activities.filter(a=>(a.triggersMachine===m.id||a.machineId===m.id)&&a.cycleTime>0);
      const takt2=acts2.length?acts2.reduce((s2,a)=>s2+a.cycleTime,0)/acts2.length:0;
      const waitPct=shiftSec>0?m.waitTime/shiftSec:0;
      if(!m.cycles)return`<tr><td><span class="mach-dot" style="background:${m.color}"></span></td><td><span class="muted">${esc(m.name)}</span></td><td colspan="9" class="xs muted">—</td></tr>`;
      return`<tr><td><span class="mach-dot" style="background:${m.color}"></span></td><td><strong>${esc(m.name)}</strong></td>
        <td><strong class="${oeeC(m.oee)}">${pct(m.oee)}</strong><div style="width:80px;margin-top:3px">${oeeBar(m.oee)}</div></td>
        <td class="${oeeC(m.avail)}">${pct(m.avail)}</td><td class="${oeeC(m.perf)}">${pct(m.perf)}</td><td class="${oeeC(m.quality)}">${pct(m.quality)}</td>
        <td class="mono">${m.cycles}</td><td class="mono">${takt2?takt2.toFixed(1)+'s':'—'}</td>
        <td class="mono">${ftm(m.runTime)}</td><td class="mono ${m.waitTime>shiftSec*0.15?'bad':''}">${ftm(m.waitTime)}</td>
        <td><div style="width:60px">${oeeBar(waitPct)}</div></td></tr>`;}).join('')}
    </tbody></table></div></div>`;

  const opTable=`<div class="card"><div class="card-hdr"><div class="card-title">👤 ${tr('oee_per_op')}</div></div>
    <div class="xs muted" style="margin-bottom:10px">${tr('op_oee_formula')}</div>
    <div class="tw"><table><thead><tr><th>${tr('f_op_name')}</th><th>${tr('op_oee')}</th><th>${tr('util')}</th><th>${tr('active_t')}</th><th>${tr('wait_t')}</th><th>${tr('idle_t')}</th></tr></thead>
    <tbody>${opRes.map(o=>{const opOEE=Math.min(o.util*lineQual,1);return`<tr>
      <td><strong>${esc(o.name)}</strong></td>
      <td><strong class="${oeeC(opOEE)}">${pct(opOEE)}</strong><div style="width:80px;margin-top:3px">${oeeBar(opOEE)}</div></td>
      <td class="${oeeC(o.util)}">${pct(o.util)}</td>
      <td class="mono">${ftm(o.activeTime)}</td><td class="mono ${o.waitTime>shiftSec*0.1?'bad':''}">${ftm(o.waitTime)}</td>
      <td class="mono">${ftm(o.idleTime)}</td></tr>`;}).join('')}
    </tbody></table></div></div>`;

  const maxW=Math.max(...Object.values(actWait).map(x=>x.totalWait),1);
  const waitRows=Object.entries(actWait).filter(([,v])=>v.count>0).sort((a,b)=>b[1].totalWait-a[1].totalWait)
    .map(([aid,v])=>{const act=s?.activities.find(x=>x.id===aid);return`<div class="wait-row">
      <div style="width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500">${esc(act?.name||aid)}</div>
      <div class="wait-bar-bg"><div class="wait-bar-fill" style="width:${(v.totalWait/maxW)*100}%"></div></div>
      <div class="mono xs" style="width:70px;text-align:right">${ftm(v.totalWait)}</div>
      <div class="xs muted" style="width:50px;text-align:right">${v.count}×</div>
      <div class="xs muted" style="width:55px;text-align:right">${pct(v.totalWait/shiftSec)}</div>
    </div>`;}).join('');
  const waitCard=`<div class="card"><div class="card-hdr"><div class="card-title">⏱ ${tr('wait_analysis')}</div></div>
    <div class="xs muted" style="margin-bottom:10px">${tr('wait_detail')}</div>${waitRows||`<div class="xs muted">—</div>`}</div>`;

  el.innerHTML=overall+machTable+opTable+waitCard;
}



// ── INIT ──────────────────────────────────────────────
ld();setLang('sk');
</script>
</body>
</html>
